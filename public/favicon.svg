<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D2818"/>
      <stop offset="100%" stop-color="#060D09"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Outer ring subtle -->
  <circle cx="16" cy="16" r="13" stroke="#22C55E" stroke-width="0.8" opacity="0.2"/>

  <!-- C shape - main -->
  <path
    d="M22 9.5A9 9 0 1 0 22 22.5"
    stroke="#22C55E"
    stroke-width="2.8"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"
    opacity="1"
  />

  <!-- C shape - glow layer -->
  <path
    d="M22 9.5A9 9 0 1 0 22 22.5"
    stroke="#4ADE80"
    stroke-width="1.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#22C55E" opacity="0.7" filter="url(#glow)"/>
</svg>
